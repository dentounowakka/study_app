<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ピクセル・実寸(mm)距離測定ツール（2枚重ね版）</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 15px;
            background-color: #f5f5f5;
        }
        .toolbar {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .file-inputs {
            display: flex;
            flex-direction: column;
            gap: 5px;
            background: #f0f0f0;
            padding: 8px;
            border-radius: 6px;
        }
        .file-inputs label {
            font-size: 12px;
            font-weight: bold;
            color: #444;
        }
        button, input, select {
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: white;
        }
        button:hover {
            background: #eee;
        }
        button.active {
            background: #d32f2f;
            color: white;
            border-color: #d32f2f;
        }
        .scale-config {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #e3f2fd;
            padding: 5px 10px;
            border-radius: 4px;
        }
        .result {
            font-size: 18px;
            font-weight: bold;
            color: #d32f2f;
            margin-left: auto; /* 右寄せ */
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        .status-msg {
            font-size: 12px;
            color: #666;
            font-weight: normal;
        }
        .canvas-container {
            width: 100%;
            height: 70vh;
            background-color: #e0e0e0;
            border: 1px solid #ccc;
            overflow: auto; /* 画像が大きい場合はスクロールバーを表示 */
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }
        canvas {
            transform-origin: top left;
            cursor: crosshair;
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <div class="file-inputs">
            <div>
                <label for="imageLoader1">画像1 (不透明度50%):</label>
                <input type="file" id="imageLoader1" accept="image/*">
            </div>
            <div>
                <label for="imageLoader2">画像2 (不透明度50%):</label>
                <input type="file" id="imageLoader2" accept="image/*">
            </div>
        </div>
        
        <div>
            <button id="zoomOut">➖ 縮小</button>
            <span id="zoomLevel" style="margin: 0 10px;">100%</span>
            <button id="zoomIn">➕ 拡大</button>
        </div>

        <div class="scale-config">
            <span>基準の長さ:</span>
            <input type="number" id="knownDistance" value="50" style="width: 60px; padding: 6px;">
            <span>mm</span>
            <button id="btnSetScale">📐 基準線を登録</button>
        </div>

        <button id="clearPoints">点をクリア</button>

        <div class="result">
            <div id="resultDisplay">距離: -</div>
            <div id="statusDisplay" class="status-msg">まずは画像（1枚以上）を読み込んでください</div>
        </div>
    </div>

    <div class="canvas-container" id="canvasContainer">
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const imageLoader1 = document.getElementById('imageLoader1');
        const imageLoader2 = document.getElementById('imageLoader2');
        const resultDisplay = document.getElementById('resultDisplay');
        const statusDisplay = document.getElementById('statusDisplay');
        const zoomLevelDisplay = document.getElementById('zoomLevel');
        const btnSetScale = document.getElementById('btnSetScale');
        const knownDistanceInput = document.getElementById('knownDistance');

        let img1 = null;
        let img2 = null;
        let points = [];
        let zoom = 1.0;

        // スケール情報 (1mmあたりのピクセル数)
        let pxPerMm = null; 
        let isSettingScaleMode = false; // 基準線登録モードフラグ

        // キャンバスのサイズを画像に合わせてリセット・再描画
        function resetCanvasSize() {
            // 読み込まれている画像のうち、大きい方のサイズにキャンバスを合わせる
            let w = 0, h = 0;
            if (img1) { w = img1.width; h = img1.height; }
            if (img2) { w = Math.max(w, img2.width); h = Math.max(h, img2.height); }

            if (w > 0 && h > 0) {
                canvas.width = w;
                canvas.height = h;
            }
            draw();
        }

        // 画像1の読み込み処理
        imageLoader1.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) {
                img1 = null;
                resetCanvasSize();
                return;
            }
            const reader = new FileReader();
            reader.onload = function(event) {
                img1 = new Image();
                img1.onload = function() {
                    statusDisplay.textContent = "画像1が読み込まれました。";
                    resetCanvasSize();
                }
                img1.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // 画像2の読み込み処理
        imageLoader2.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) {
                img2 = null;
                resetCanvasSize();
                return;
            }
            const reader = new FileReader();
            reader.onload = function(event) {
                img2 = new Image();
                img2.onload = function() {
                    statusDisplay.textContent = "画像2が読み込まれました。";
                    resetCanvasSize();
                }
                img2.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // ズーム機能
        document.getElementById('zoomIn').addEventListener('click', () => {
            zoom += 0.2;
            updateZoomDisplay();
            draw();
        });

        document.getElementById('zoomOut').addEventListener('click', () => {
            zoom = Math.max(0.2, zoom - 0.2);
            updateZoomDisplay();
            draw();
        });

        function updateZoomDisplay() {
            canvas.style.transform = `scale(${zoom})`;
            zoomLevelDisplay.textContent = `${Math.round(zoom * 100)}%`;
        }

        // 「基準線を登録」ボタンの挙動
        btnSetScale.addEventListener('click', () => {
            if (!img1 && !img2) return;
            isSettingScaleMode = true;
            points = []; // 新たに2点打ってもらうためにリセット
            btnSetScale.classList.add('active');
            statusDisplay.textContent = "【基準設定モード】実際の長さの2点（円柱の端など）をクリックしてください。";
            draw();
            updateResult();
        });

        // クリックで点を打つ処理
        canvas.addEventListener('mousedown', function(e) {
            if (!img1 && !img2) return;

            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / zoom;
            const y = (e.clientY - rect.top) / zoom;

            if (points.length >= 2) {
                points = [];
            }

            points.push({ x: x, y: y });

            // 2点打たれた瞬間のモード判定
            if (points.length === 2 && isSettingScaleMode) {
                const dx = points[1].x - points[0].x;
                const dy = points[1].y - points[0].y;
                const pxDist = Math.sqrt(dx * dx + dy * dy);
                const knownMm = parseFloat(knownDistanceInput.value) || 1.0;
                
                // 1mmあたりのピクセル数を確定
                pxPerMm = pxDist / knownMm; 
                isSettingScaleMode = false;
                btnSetScale.classList.remove('active');
                statusDisplay.textContent = `基準設定完了: ${knownMm}mm = ${pxDist.toFixed(1)}px に固定しました。`;
            } else if (points.length === 2 && !isSettingScaleMode) {
                statusDisplay.textContent = "計測完了。次の2点をクリックすると再計測できます。";
            } else if (points.length === 1) {
                statusDisplay.textContent = isSettingScaleMode ? "基準の2点目をクリックしてください。" : "測定の2点目をクリックしてください。";
            }

            draw();
            updateResult();
        });

        // 点のクリア
        document.getElementById('clearPoints').addEventListener('click', () => {
            points = [];
            draw();
            updateResult();
            if(!isSettingScaleMode) {
                statusDisplay.textContent = "点をクリアしました。";
            }
        });

        // 描画処理
        function draw() {
            if (!img1 && !img2) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // --- 画像の重ね合わせ（それぞれ透過度50%） ---
            ctx.save();
            ctx.globalAlpha = 0.5; // ここから下の描画の透過度を50%にする
            
            if (img1) {
                ctx.drawImage(img1, 0, 0);
            }
            if (img2) {
                ctx.drawImage(img2, 0, 0);
            }
            
            ctx.restore(); // 透過設定を元に戻す（計測線や点に影響させないため）
            // ----------------------------------------

            const pointRadius = 5 / zoom;
            const lineWidth = 2 / zoom;

            // 点を描画（基準モードなら青、計測モードなら赤）
            ctx.fillStyle = isSettingScaleMode ? '#0026ff' : '#ff0000';
            ctx.strokeStyle = isSettingScaleMode ? '#0026ff' : '#ff0000';
            
            points.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, pointRadius, 0, Math.PI * 2);
                ctx.fill();
            });

            // 2点あれば線を引く
            if (points.length === 2) {
                ctx.beginPath();
                ctx.moveTo(points[0].x, points[0].y);
                ctx.lineTo(points[1].x, points[1].y);
                ctx.lineWidth = lineWidth;
                ctx.stroke();
            }
        }

        // 距離の計算と表示
        function updateResult() {
            if (points.length === 2) {
                const dx = points[1].x - points[0].x;
                const dy = points[1].y - points[0].y;
                const pxDistance = Math.sqrt(dx * dx + dy * dy);
                
                if (pxPerMm) {
                    // 基準が設定されていればmm換算も表示
                    const mmDistance = pxDistance / pxPerMm;
                    resultDisplay.innerHTML = `<div>${mmDistance.toFixed(2)} mm</div><div style="font-size:12px; color:#777;">(${pxDistance.toFixed(1)} px)</div>`;
                } else {
                    // 基準がない場合はpxのみ
                    resultDisplay.textContent = `${pxDistance.toFixed(1)} px`;
                }
            } else if (points.length === 1) {
                resultDisplay.textContent = `測定中...`;
            } else {
                resultDisplay.textContent = `-`;
            }
        }
    </script>
</body>
</html>
