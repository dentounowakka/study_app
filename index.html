<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ピクセル・実寸(mm)距離測定ツール（2枚重ね版）</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #eef3f8;
            --surface: #ffffff;
            --surface-strong: #f8fafc;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --accent: #ef4444;
            --text: #172033;
            --muted: #667085;
            --border: #d9e2ec;
            --shadow: 0 18px 45px rgba(15, 23, 42, 0.10);
            --radius: 18px;
        }

        * { box-sizing: border-box; }

        body {
            min-height: 100vh;
            margin: 0;
            padding: clamp(12px, 2vw, 24px);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.16), transparent 32rem),
                linear-gradient(135deg, #eef3f8 0%, #f8fbff 100%);
        }

        .app-shell {
            display: grid;
            grid-template-rows: auto 1fr;
            gap: clamp(12px, 2vw, 20px);
            width: min(100%, 1440px);
            min-height: calc(100vh - clamp(24px, 4vw, 48px));
            margin: 0 auto;
        }

        .toolbar {
            display: grid;
            grid-template-columns: minmax(260px, 1.1fr) repeat(3, auto) minmax(190px, 0.8fr);
            gap: 14px;
            align-items: stretch;
            padding: clamp(14px, 2vw, 20px);
            border: 1px solid rgba(255, 255, 255, 0.82);
            border-radius: var(--radius);
            background: rgba(255, 255, 255, 0.88);
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
        }

        .panel {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: var(--surface-strong);
        }

        .file-inputs {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .file-field {
            display: grid;
            gap: 6px;
            min-width: 0;
        }

        .file-field label,
        .scale-config span,
        .zoom-tools span {
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            white-space: nowrap;
        }

        button, input {
            min-height: 42px;
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: white;
            color: var(--text);
            font: inherit;
            font-size: 14px;
        }

        input[type="file"] {
            width: 100%;
            min-width: 0;
            cursor: pointer;
        }

        input[type="number"] {
            width: 84px;
            text-align: right;
        }

        button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
        }

        button:hover { transform: translateY(-1px); border-color: #b6c4d6; }
        button:focus-visible, input:focus-visible { outline: 3px solid rgba(37, 99, 235, 0.28); outline-offset: 2px; }

        .primary-button {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
        }

        .primary-button:hover { background: var(--primary-dark); border-color: var(--primary-dark); }

        button.active {
            border-color: var(--accent);
            background: var(--accent);
            color: white;
        }

        .zoom-tools, .scale-config { justify-content: center; }

        .result {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
            gap: 4px;
            min-width: 0;
            padding: 12px 14px;
            border: 1px solid rgba(239, 68, 68, 0.25);
            border-radius: 14px;
            background: #fff7f7;
            text-align: right;
        }

        #resultDisplay {
            font-size: clamp(20px, 2.5vw, 30px);
            line-height: 1.1;
            font-weight: 800;
            color: var(--accent);
        }

        .status-msg {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.4;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            min-height: 420px;
            height: clamp(420px, 70vh, 820px);
            overflow: auto;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background:
                linear-gradient(45deg, #dce5ef 25%, transparent 25%),
                linear-gradient(-45deg, #dce5ef 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #dce5ef 75%),
                linear-gradient(-45deg, transparent 75%, #dce5ef 75%);
            background-color: #edf2f7;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0;
            background-size: 20px 20px;
            box-shadow: inset 0 0 24px rgba(15, 23, 42, 0.09), var(--shadow);
            touch-action: none;
        }

        .empty-state {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            color: var(--muted);
            text-align: center;
            pointer-events: none;
        }

        .empty-state-card {
            max-width: 420px;
            padding: 24px;
            border: 1px dashed #a8b7ca;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.78);
        }

        canvas {
            display: block;
            transform-origin: top left;
            cursor: crosshair;
        }

        @media (max-width: 1180px) {
            .toolbar { grid-template-columns: 1fr 1fr; }
            .file-inputs, .result { grid-column: 1 / -1; }
            .result { align-items: flex-start; text-align: left; }
        }

        @media (max-width: 760px) {
            body { padding: 10px; }
            .app-shell { min-height: calc(100vh - 20px); }
            .toolbar { grid-template-columns: 1fr; border-radius: 16px; }
            .file-inputs { grid-template-columns: 1fr; }
            .panel, .zoom-tools, .scale-config { flex-wrap: wrap; justify-content: flex-start; }
            .panel > button { flex: 1 1 130px; }
            input[type="number"] { flex: 1 1 90px; }
            .canvas-container { min-height: 360px; height: 62vh; border-radius: 16px; }
        }
    </style>
</head>
<body>
    <main class="app-shell">
        <section class="toolbar" aria-label="測定ツールバー">
            <div class="panel file-inputs">
                <div class="file-field">
                    <label for="imageLoader1">画像1（不透明度50%）</label>
                    <input type="file" id="imageLoader1" accept="image/*">
                </div>
                <div class="file-field">
                    <label for="imageLoader2">画像2（不透明度50%）</label>
                    <input type="file" id="imageLoader2" accept="image/*">
                </div>
            </div>

            <div class="panel zoom-tools" aria-label="ズーム操作">
                <button id="zoomOut" type="button">➖ 縮小</button>
                <span id="zoomLevel">100%</span>
                <button id="zoomIn" type="button">➕ 拡大</button>
                <button id="fitToScreen" type="button">↔️ 全体表示</button>
            </div>

            <div class="panel scale-config">
                <span>基準の長さ</span>
                <input type="number" id="knownDistance" value="50" min="0.01" step="0.01" inputmode="decimal" aria-label="基準の長さ（mm）">
                <span>mm</span>
                <button id="btnSetScale" type="button" class="primary-button">📐 基準線を登録</button>
            </div>

            <div class="panel">
                <button id="clearPoints" type="button">点をクリア</button>
            </div>

            <div class="result" aria-live="polite">
                <div id="resultDisplay">-</div>
                <div id="statusDisplay" class="status-msg">まずは画像（1枚以上）を読み込んでください</div>
            </div>
        </section>

        <section class="canvas-container" id="canvasContainer" aria-label="画像測定エリア">
            <div class="empty-state" id="emptyState">
                <div class="empty-state-card">
                    <strong>画像を読み込むとここに表示されます</strong><br>
                    PCでもスマートフォンでも、2点をタップ/クリックして距離を測定できます。
                </div>
            </div>
            <canvas id="canvas"></canvas>
        </section>
    </main>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const imageLoader1 = document.getElementById('imageLoader1');
        const imageLoader2 = document.getElementById('imageLoader2');
        const resultDisplay = document.getElementById('resultDisplay');
        const statusDisplay = document.getElementById('statusDisplay');
        const zoomLevelDisplay = document.getElementById('zoomLevel');
        const btnSetScale = document.getElementById('btnSetScale');
        const knownDistanceInput = document.getElementById('knownDistance');
        const canvasContainer = document.getElementById('canvasContainer');
        const emptyState = document.getElementById('emptyState');

        let img1 = null;
        let img2 = null;
        let points = [];
        let zoom = 1.0;
        let pxPerMm = null;
        let isSettingScaleMode = false;

        function hasImage() {
            return Boolean(img1 || img2);
        }

        function getCanvasSize() {
            let w = 0;
            let h = 0;
            if (img1) { w = img1.width; h = img1.height; }
            if (img2) { w = Math.max(w, img2.width); h = Math.max(h, img2.height); }
            return { w, h };
        }

        function resetCanvasSize({ fit = true } = {}) {
            const { w, h } = getCanvasSize();
            emptyState.hidden = hasImage();

            if (w > 0 && h > 0) {
                canvas.width = w;
                canvas.height = h;
                if (fit) fitCanvasToContainer();
            } else {
                canvas.width = 0;
                canvas.height = 0;
                zoom = 1;
                updateZoomDisplay();
            }
            draw();
        }

        function loadImage(file, imageNumber) {
            if (!file) return Promise.resolve(null);

            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const image = new Image();
                    image.onload = () => resolve(image);
                    image.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }).then((image) => {
                statusDisplay.textContent = `画像${imageNumber}が読み込まれました。`;
                return image;
            });
        }

        imageLoader1.addEventListener('change', async (e) => {
            img1 = await loadImage(e.target.files[0], 1);
            resetCanvasSize();
        });

        imageLoader2.addEventListener('change', async (e) => {
            img2 = await loadImage(e.target.files[0], 2);
            resetCanvasSize();
        });

        document.getElementById('zoomIn').addEventListener('click', () => setZoom(zoom + 0.2));
        document.getElementById('zoomOut').addEventListener('click', () => setZoom(zoom - 0.2));
        document.getElementById('fitToScreen').addEventListener('click', fitCanvasToContainer);

        function setZoom(nextZoom) {
            zoom = Math.min(6, Math.max(0.1, nextZoom));
            updateZoomDisplay();
        }

        function fitCanvasToContainer() {
            if (!hasImage()) return;
            const padding = 24;
            const scaleX = (canvasContainer.clientWidth - padding) / canvas.width;
            const scaleY = (canvasContainer.clientHeight - padding) / canvas.height;
            setZoom(Math.min(1, Math.max(0.1, Math.min(scaleX, scaleY))));
        }

        function updateZoomDisplay() {
            canvas.style.transform = `scale(${zoom})`;
            zoomLevelDisplay.textContent = `${Math.round(zoom * 100)}%`;
        }

        btnSetScale.addEventListener('click', () => {
            if (!hasImage()) return;
            isSettingScaleMode = true;
            points = [];
            btnSetScale.classList.add('active');
            statusDisplay.textContent = '【基準設定モード】実際の長さの2点（円柱の端など）をクリックしてください。';
            draw();
            updateResult();
        });

        canvas.addEventListener('pointerdown', (e) => {
            if (!hasImage()) return;
            canvas.setPointerCapture(e.pointerId);
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / zoom;
            const y = (e.clientY - rect.top) / zoom;

            if (points.length >= 2) points = [];
            points.push({ x, y });

            if (points.length === 2 && isSettingScaleMode) {
                const pxDist = getDistance(points[0], points[1]);
                const knownMm = parseFloat(knownDistanceInput.value) || 1.0;
                pxPerMm = pxDist / knownMm;
                isSettingScaleMode = false;
                btnSetScale.classList.remove('active');
                statusDisplay.textContent = `基準設定完了: ${knownMm}mm = ${pxDist.toFixed(1)}px に固定しました。`;
            } else if (points.length === 2) {
                statusDisplay.textContent = '計測完了。次の2点をクリックすると再計測できます。';
            } else if (points.length === 1) {
                statusDisplay.textContent = isSettingScaleMode ? '基準の2点目をクリックしてください。' : '測定の2点目をクリックしてください。';
            }

            draw();
            updateResult();
        });

        document.getElementById('clearPoints').addEventListener('click', () => {
            points = [];
            draw();
            updateResult();
            if (!isSettingScaleMode) statusDisplay.textContent = '点をクリアしました。';
        });

        window.addEventListener('resize', () => {
            if (hasImage() && zoom <= 1) fitCanvasToContainer();
        });

        function draw() {
            if (!hasImage()) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.globalAlpha = 0.5;
            if (img1) ctx.drawImage(img1, 0, 0);
            if (img2) ctx.drawImage(img2, 0, 0);
            ctx.restore();

            const pointRadius = Math.max(4, 5 / zoom);
            const lineWidth = Math.max(2, 2 / zoom);
            ctx.fillStyle = isSettingScaleMode ? '#2563eb' : '#ef4444';
            ctx.strokeStyle = isSettingScaleMode ? '#2563eb' : '#ef4444';
            ctx.lineWidth = lineWidth;

            points.forEach((p) => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, pointRadius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = lineWidth / 2;
                ctx.stroke();
                ctx.strokeStyle = isSettingScaleMode ? '#2563eb' : '#ef4444';
                ctx.lineWidth = lineWidth;
            });

            if (points.length === 2) {
                ctx.beginPath();
                ctx.moveTo(points[0].x, points[0].y);
                ctx.lineTo(points[1].x, points[1].y);
                ctx.stroke();
            }
        }

        function getDistance(pointA, pointB) {
            const dx = pointB.x - pointA.x;
            const dy = pointB.y - pointA.y;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function updateResult() {
            if (points.length === 2) {
                const pxDistance = getDistance(points[0], points[1]);
                if (pxPerMm) {
                    const mmDistance = pxDistance / pxPerMm;
                    resultDisplay.innerHTML = `<div>${mmDistance.toFixed(2)} mm</div><div style="font-size:13px; color:#667085;">(${pxDistance.toFixed(1)} px)</div>`;
                } else {
                    resultDisplay.textContent = `${pxDistance.toFixed(1)} px`;
                }
            } else if (points.length === 1) {
                resultDisplay.textContent = '測定中...';
            } else {
                resultDisplay.textContent = '-';
            }
        }
    </script>
</body>
</html>
